[server]
listen = 127.0.0.1:10050
log_file = /var/log/greylight.log
debug = yes

[db]
path = /var/lib/greylight/greylight.sqlite

[logic]
delay_sec = 300
pass_ttl_days = 30
cleanup_interval_sec = 3600

# Modo prueba: solo aplica greylisting a RCPT que terminen en @mesi.com.ar
# only_rcpt_domain = mesi.com.ar

# Bypass total (sin retry) para estos dominios destinatarios:
ignore_rcpt_domains = panel.com.ar, otrodominio.com
